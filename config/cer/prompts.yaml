# CER Review Workflow v1 - Prompt Bindings
# Aligned with CER_STATE_MACHINE_BLUEPRINT_V1.md and CER_ADJUDICATION_AND_BUNDLE_SCHEMA_V1.md
# 7 agents + 1 aggregator (no shared prompts per agent)
# RISK_BENEFIT constraint: No agent prompt may claim terminal BRR decision

prompt_bindings:

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-001: Intake Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-001
    agent_name: Intake Agent
    agent_key: cer_intake_agent
    prompt_path: prompts/cer/intake_agent.md
    output_format: json
    primary_object: INTENDED_PURPOSE
    owned_questions: [O1-Q1, O1-Q2]
    lane_state: S00  # INTAKE_RECEIVED
    risk_benefit_contribution: none
    gate_escalation: O1-Q4 MISMATCH → Gate 0

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-002: Route Screen Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-002
    agent_name: Route Screen Agent
    agent_key: cer_route_screen_agent
    prompt_path: prompts/cer/route_screen_agent.md
    output_format: json
    primary_object: none  # Supporting only
    supporting_questions: [O1-Q3, O1-Q4, O2-Q3, O2-Q5]
    lane_state: S02  # ROUTE_CONFIRMED
    risk_benefit_contribution: none
    gate_escalation: O1-Q4 → Gate 0; O2-Q5 → Gate 1

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-003: Claim Scope Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-003
    agent_name: Claim Scope Agent
    agent_key: cer_claim_scope_agent
    prompt_path: prompts/cer/claim_scope_agent.md
    output_format: json
    primary_object: CLAIM
    owned_questions: [O2-Q1, O2-Q2, O2-Q4]
    lane_state: S03  # LANE_2A_RUNNING
    risk_benefit_contribution:
      questions: [O5-Q3]
      type: benefit_magnitude_characterization
      layer: 1
      composite_note: Partial contribution only — not terminal RISK_BENEFIT decision
    gate_escalation: O2-Q2 INSUFFICIENT → Gate 2; O2-Q4 UNSUPPORTED → Gate 2
    forbidden_claims:
      - "I have decided RISK_BENEFIT is acceptable"
      - "BRR_ACCEPTABLE"
      - "BRR_UNACCEPTABLE"
      - terminal RISK_BENEFIT disposition

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-004: SOTA Evidence Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-004
    agent_name: SOTA Evidence Agent
    agent_key: cer_sota_evidence_agent
    prompt_path: prompts/cer/sota_evidence_agent.md
    output_format: json
    primary_object: EVIDENCE_BLOCK
    owned_questions: [O3-Q1, O3-Q2, O3-Q3, O3-Q4]
    lane_state: S04  # LANE_2B_RUNNING
    risk_benefit_contribution:
      questions: [O5-Q3]
      type: clinical_benefit_support
      layer: 1
      composite_note: Partial contribution only — not terminal RISK_BENEFIT decision
    gate_escalation: O3-Q2 QUALITY_BELOW_THRESHOLD → Gate 2
    forbidden_claims:
      - terminal RISK_BENEFIT disposition

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-005: Equivalence Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-005
    agent_name: Equivalence Agent
    agent_key: cer_equivalence_agent
    prompt_path: prompts/cer/equivalence_agent.md
    output_format: json
    primary_object: EQUIVALENCE_UNIT
    owned_questions: [O4-Q1, O4-Q2, O4-Q3, O4-Q4, O4-Q5]
    lane_state: S05  # LANE_2C_RUNNING
    risk_benefit_contribution:
      questions: [O5-Q3]
      type: equivalence_based_benefit
      layer: 1
      composite_note: Partial contribution only — not terminal RISK_BENEFIT decision
    gate_escalation: O4-Q4 NOT_SUPPORTED → Gate 1; O4-Q5 ACCESS_UNVERIFIED → Gate 1
    special_checks:
      - access_to_data_verification
      - three_dimensional_assessment
      - multiple_predicates_boundary
    forbidden_claims:
      - terminal RISK_BENEFIT disposition

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-006: Consistency Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-006
    agent_name: Consistency Agent
    agent_key: cer_consistency_agent
    prompt_path: prompts/cer/consistency_agent.md
    output_format: json
    primary_object: CROSS_DOC_LINK
    owned_questions: [O7-Q1, O7-Q2, O7-Q3, O7-Q4]
    lane_state: S06  # LANE_2D_RUNNING
    risk_benefit_contribution:
      questions: [O5-Q1, O5-Q4, O5-Q5]
      type: risk_controls_and_alignment
      layer: 1  # O5-Q1, O5-Q4; O5-Q5 is Layer 3 human
      composite_note: Partial contribution only — O5-Q5 requires human judgment at Gate 3
    gate_escalation: none  # CROSS_DOC_LINK all Layer 1
    fix_01_note: AG-006 does NOT own RISK_BENEFIT — RISK_BENEFIT is composite
    forbidden_claims:
      - "I have decided RISK_BENEFIT is acceptable"
      - terminal RISK_BENEFIT disposition
      - RISK_BENEFIT primary ownership claim

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-007: PMCF Lifecycle Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-007
    agent_name: PMCF Lifecycle Agent
    agent_key: cer_pmcf_lifecycle_agent
    prompt_path: prompts/cer/pmcf_lifecycle_agent.md
    output_format: json
    primary_object: PMCF_HANDOFF
    owned_questions: [O6-Q1, O6-Q2, O6-Q3, O6-Q4, O6-Q5]
    lane_state: S06  # LANE_2D_RUNNING
    risk_benefit_contribution:
      questions: [O5-Q3]
      type: post_market_benefit_data
      layer: 1
      composite_note: Partial contribution only — not terminal RISK_BENEFIT decision
    gate_escalation: O6-Q2 INADEQUATE → Gate 2; O6-Q4 NOT_ASSESSED → Gate 2
    forbidden_claims:
      - terminal RISK_BENEFIT disposition

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-008: Review Package Agent (Aggregator)
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-008
    agent_name: Review Package Agent
    agent_key: cer_review_package_agent
    prompt_path: prompts/cer/review_package_agent.md
    output_format: json
    primary_object: none  # Aggregator only
    lane_state: S12  # REVIEW_PACKAGE_READY
    risk_benefit_contribution: none  # Aggregation only, no primary decision
    forbidden_claims:
      - terminal RISK_BENEFIT disposition
      - Overall PASS/FAIL verdict (human records)

# ─────────────────────────────────────────────────────────────────────────────
# Prompt Loading Constraints
# From: CER_WORKFLOW_SYSTEM_BLUEPRINT_V1.md Section 1
# ─────────────────────────────────────────────────────────────────────────────
prompt_loading:
  source_root: prompts/cer/
  format: markdown
  enforcement:
    no_shared_prompts: Each agent must have its own dedicated prompt file
    no_universal_reviewer: A single generic reviewer prompt cannot replace specialized lanes
    no_adjudication_prompt_in_lane: Lane agent prompts cannot claim human adjudication authority
    risk_benefit_terminal_prohibition: No prompt may instruct agent to issue BRR_ACCEPTABLE/UNACCEPTABLE/MISALIGNED

# ─────────────────────────────────────────────────────────────────────────────
# Output Format Requirements
# From: CER_ADJUDICATION_AND_BUNDLE_SCHEMA_V1.md
# ─────────────────────────────────────────────────────────────────────────────
output_format_requirements:
  json_required: true
  version_field: bundle_version
  round_id_field: round_id
  bundle_id_field: bundle_id
  append_only_note: All bundles are immutable once written

# ─────────────────────────────────────────────────────────────────────────────
# Lane-State to Prompt Binding
# From: CER_STATE_MACHINE_BLUEPRINT_V1.md Section 2.2
# ─────────────────────────────────────────────────────────────────────────────
lane_state_prompt_binding:
  S00_INTAKE_RECEIVED:
    prompt: intake_agent.md
    primary_agent: AG-001
  S02_ROUTE_CONFIRMED:
    prompt: route_screen_agent.md
    primary_agent: AG-002
  S03_LANE_2A_RUNNING:
    prompt: claim_scope_agent.md
    primary_agent: AG-003
  S04_LANE_2B_RUNNING:
    prompt: sota_evidence_agent.md
    primary_agent: AG-004
  S05_LANE_2C_RUNNING:
    prompt: equivalence_agent.md
    primary_agent: AG-005
  S06_LANE_2D_RUNNING:
    prompts:
      - consistency_agent.md  # AG-006
      - pmcf_lifecycle_agent.md  # AG-007
    parallel_execution: true
  S08_GATE_1_PENDING:
    prompt: none  # Human gate — no agent prompt
  S09_GATE_2_PENDING:
    prompt: none  # Human gate — no agent prompt
  S10_BRR_ASSEMBLY_RUNNING:
    prompt: none  # System assembly — no agent prompt
  S11_GATE_3_PENDING:
    prompt: none  # Human gate — no agent prompt; human only decision
  S12_REVIEW_PACKAGE_READY:
    prompt: review_package_agent.md
    primary_agent: AG-008
