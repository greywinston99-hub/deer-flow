# CER Agent Registry Configuration v1
# Implements CER_AGENT_SYSTEM_BLUEPRINT_V1.md with FIX_01 corrections
# Frozen Baseline: CER_AGENT_SYSTEM_BLUEPRINT_V1.md + CER_AGENT_SYSTEM_BLUEPRINT_FIX_NOTE.md
# Hard constraints: RISK_BENEFIT composite (no single machine owner); final BRR belongs to Human Clinical Adjudication ONLY

agents:

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-001: Intake Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-001
    agent_name: Intake Agent
    agent_key: cer_intake_agent
    description: Document intake, Evidence Pack assembly (EP-001–EP-005), INTENDED_PURPOSE initial extraction (O1-Q1, O1-Q2)
    scope: Document intake and manifest creation
    primary_object: INTENDED_PURPOSE
    owned_questions:
      - O1-Q1: Is the intended purpose clear and unambiguous?  [Layer 1]
      - O1-Q2: Is the target population explicitly defined?   [Layer 1]
    non_owned_objects:
      - CLAIM
      - EVIDENCE_BLOCK
      - EQUIVALENCE_UNIT
      - RISK_BENEFIT
      - PMCF_HANDOFF
      - CROSS_DOC_LINK
    cannot_decide:
      - O1-Q3: Cross-doc consistency (Route Screen Agent)
      - O1-Q4: Cross-doc consistency (Route Screen Agent, Layer 2)
      - Any CLAIM questions
      - Any RISK_BENEFIT questions
      - Overall PASS/FAIL verdict
    evidence_packs_produced:
      - EP-001: Product Definition Pack
      - EP-002: SOTA Pack
      - EP-003: Equivalence Pack
      - EP-004: Clinical Evidence Pack
      - EP-005: Risk & Consistency Pack
    output_artifacts:
      - run_manifest.json
      - input_inventory.json
      - intended_purpose_validation.json
    allowed_stages:
      - stage_0_intake
      - stage_6_rework
    risk_benefit_contribution: none
    human_gate_escalation:
      - O1-Q4 MISMATCH → Gate 0
    can_set_final_disposition: false
    can_override_human_decision: false

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-002: Route Screen Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-002
    agent_name: Route Screen Agent
    agent_key: cer_route_screen_agent
    description: Route determination (Literature vs Equivalence vs Mixed), supporting INTENDED_PURPOSE validation, supporting CLAIM flagging
    scope: Route determination and special procedure screening
    primary_object: none  # Supporting only
    supporting_objects:
      - INTENDED_PURPOSE: [O1-Q3, O1-Q4]  # Cross-doc validation
      - CLAIM: [O2-Q3, O2-Q5]             # Scope alignment, route declaration
    non_owned_objects:
      - CLAIM (primary owner: AG-003)
      - EVIDENCE_BLOCK
      - EQUIVALENCE_UNIT
      - RISK_BENEFIT
      - PMCF_HANDOFF
      - CROSS_DOC_LINK
    cannot_decide:
      - O1-Q1, O1-Q2: Intake Agent
      - O2-Q1, O2-Q2, O2-Q4: Claim Scope Agent
      - Any EVIDENCE_BLOCK questions
      - Any EQUIVALENCE_UNIT questions
      - Any RISK_BENEFIT questions
      - Overall PASS/FAIL verdict
    evidence_packs_consumed:
      - EP-001
      - EP-005
    output_artifacts:
      - route_decision_draft.json
      - special_procedure_flags.json
    allowed_stages:
      - stage_1_route
      - stage_6_rework
    human_gate_escalation:
      - O1-Q4 MISMATCH → Gate 0
      - O2-Q5 ROUTE_MISSING → Gate 1
    can_set_final_disposition: false
    can_override_human_decision: false

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-003: Claim Scope Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-003
    agent_name: Claim Scope Agent
    agent_key: cer_claim_scope_agent
    description: CLAIM ownership, claim-evidence mapping, sufficiency assessment, scope alignment, SOTA/equivalence novelty support
    scope: CLAIM primary ownership
    primary_object: CLAIM
    owned_questions:
      - O2-Q1: Is each claim mapped to at least one evidence block?      [Layer 1]
      - O2-Q2: Does mapped evidence meet sufficiency threshold?          [Layer 2]
      - O2-Q4: Is claim supported by SOTA or equivalence?               [Layer 3]
    supporting_objects:
      - INTENDED_PURPOSE: [O2-Q3]  # Scope alignment via Route Screen
    non_owned_objects:
      - INTENDED_PURPOSE (primary: AG-001)
      - EVIDENCE_BLOCK (primary: AG-004)
      - EQUIVALENCE_UNIT (primary: AG-005)
      - RISK_BENEFIT (composite — no machine owner)
      - PMCF_HANDOFF (primary: AG-007)
      - CROSS_DOC_LINK (primary: AG-006)
    cannot_decide:
      - O2-Q2 sufficiency when quality below threshold → Gate 2
      - O2-Q4 novelty/SOTA support → Gate 2 (Layer 3, can flag but not adjudicate)
      - RISK_BENEFIT final decision → Gate 3 Human Clinical Adjudication ONLY
      - Any INTENDED_PURPOSE questions (primary: AG-001)
      - Any EVIDENCE_BLOCK questions beyond relevance mapping
      - Overall PASS/FAIL verdict
    evidence_packs_consumed:
      - EP-001  # Claim scope alignment
      - EP-002  # SOTA support
      - EP-003  # Equivalence support
      - EP-004  # Evidence blocks
    output_artifacts:
      - claim_consistency_matrix.json
      - risk_benefit_contribution_report.json  # O5-Q3 partial
    allowed_stages:
      - stage_2_lane_2a
      - stage_6_rework
    human_gate_escalation:
      - O2-Q2 INSUFFICIENT → Gate 2
      - O2-Q4 UNSUPPORTED → Gate 2
    risk_benefit_contribution:
      questions_answered: [O5-Q3]
      contribution_type: benefit_magnitude_characterization
      evidence_packs: [EP-001, EP-004]
      layer: 1
      composite_note: Partial contribution only. Not a terminal RISK_BENEFIT decision.
    can_set_final_disposition: false
    can_override_human_decision: false

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-004: SOTA Evidence Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-004
    agent_name: SOTA Evidence Agent
    agent_key: cer_sota_evidence_agent
    description: EVIDENCE_BLOCK ownership, evidence quality, relevance, currency, documentation adequacy
    scope: EVIDENCE_BLOCK primary ownership
    primary_object: EVIDENCE_BLOCK
    owned_questions:
      - O3-Q1: Is the evidence relevant to at least one claim?           [Layer 1]
      - O3-Q2: Does evidence meet minimum quality threshold?              [Layer 2]
      - O3-Q3: Is evidence currency within acceptable range?             [Layer 1]
      - O3-Q4: Is literature search methodology documented?             [Layer 1]
    supporting_objects: none
    non_owned_objects:
      - INTENDED_PURPOSE (primary: AG-001)
      - CLAIM (primary: AG-003)
      - EQUIVALENCE_UNIT (primary: AG-005)
      - RISK_BENEFIT (composite — no machine owner)
      - PMCF_HANDOFF (primary: AG-007)
      - CROSS_DOC_LINK (primary: AG-006)
    cannot_decide:
      - O3-Q2 when quality is borderline → Gate 2 (can assess but not auto-adjudicate)
      - RISK_BENEFIT final decision → Gate 3 Human Clinical Adjudication ONLY
      - Any CLAIM questions (primary: AG-003)
      - Overall PASS/FAIL verdict
    evidence_packs_consumed:
      - EP-002  # Literature search, SOTA benchmarks
      - EP-004  # Clinical investigation quality, GRADE
    output_artifacts:
      - evidence_qualified_report.json
      - risk_benefit_contribution_report.json  # O5-Q3 partial
    allowed_stages:
      - stage_2_lane_2b
      - stage_6_rework
    human_gate_escalation:
      - O3-Q2 QUALITY_BELOW_THRESHOLD → Gate 2
    risk_benefit_contribution:
      questions_answered: [O5-Q3]
      contribution_type: clinical_benefit_support
      evidence_packs: [EP-002, EP-004]
      layer: 1
      composite_note: Partial contribution only. Not a terminal RISK_BENEFIT decision.
    can_set_final_disposition: false
    can_override_human_decision: false

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-005: Equivalence Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-005
    agent_name: Equivalence Agent
    agent_key: cer_equivalence_agent
    description: EQUIVALENCE_UNIT ownership, 3D equivalence documentation, access verification, clinical equivalence support
    scope: EQUIVALENCE_UNIT primary ownership
    primary_object: EQUIVALENCE_UNIT
    owned_questions:
      - O4-Q1: Is 3D equivalence comprehensively documented?              [Layer 1]
      - O4-Q2: Is technical equivalence dimension accessible?            [Layer 1]
      - O4-Q3: Is biological equivalence dimension accessible?           [Layer 1]
      - O4-Q4: Is clinical equivalence dimension supported?              [Layer 3]
      - O4-Q5: Has access to predicate device data been verified?        [Layer 2]
    supporting_objects: none
    non_owned_objects:
      - INTENDED_PURPOSE (primary: AG-001)
      - CLAIM (primary: AG-003)
      - EVIDENCE_BLOCK (primary: AG-004)
      - RISK_BENEFIT (composite — no machine owner)
      - PMCF_HANDOFF (primary: AG-007)
      - CROSS_DOC_LINK (primary: AG-006)
    cannot_decide:
      - O4-Q4 clinical equivalence support → Gate 1 (can assess but not adjudicate, Layer 3)
      - O4-Q5 access verification → Gate 1 (can flag but not adjudicate, Layer 2)
      - RISK_BENEFIT final decision → Gate 3 Human Clinical Adjudication ONLY
      - Any CLAIM questions
      - Overall PASS/FAIL verdict
    evidence_packs_consumed:
      - EP-003  # Equivalence documentation only
    output_artifacts:
      - equivalence_3d_assessment.json
      - risk_benefit_contribution_report.json  # O5-Q3 partial
    allowed_stages:
      - stage_2_lane_2c
      - stage_6_rework
    special_checks:
      - access_to_data_verification
      - three_dimensional_assessment
      - multiple_predicates_boundary
    human_gate_escalation:
      - O4-Q4 NOT_SUPPORTED → Gate 1
      - O4-Q5 ACCESS_UNVERIFIED → Gate 1
    risk_benefit_contribution:
      questions_answered: [O5-Q3]
      contribution_type: equivalence_based_benefit
      evidence_packs: [EP-003]
      layer: 1
      composite_note: Partial contribution only. Not a terminal RISK_BENEFIT decision.
    can_set_final_disposition: false
    can_override_human_decision: false

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-006: Consistency Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-006
    agent_name: Consistency Agent
    agent_key: cer_consistency_agent
    description: >
      CROSS_DOC_LINK ownership (cross-document consistency).
      Contributes to RISK_BENEFIT (O5-Q1 risk controls, O5-Q4 formal BR assessment, O5-Q5 CER/RMF alignment).
      DOES NOT own RISK_BENEFIT — RISK_BENEFIT is composite adjudication-owned.
    scope: >
      CROSS_DOC_LINK primary ownership (O7-Q1 through O7-Q4).
      RISK_BENEFIT partial contribution (O5-Q1, O5-Q4, O5-Q5 — NOT terminal decision).
    primary_object: CROSS_DOC_LINK
    owned_questions:
      - O7-Q1: Are all cross-references valid (document exists)?        [Layer 1]
      - O7-Q2: Do referenced versions match current versions?           [Layer 1]
      - O7-Q3: Is claim-evidence alignment maintained?                  [Layer 1]
      - O7-Q4: Do update triggers remain consistent?                   [Layer 1]
    risk_benefit_contribution_only:
      questions_answered: [O5-Q1, O5-Q4, O5-Q5]
      contribution_type: risk_controls_and_alignment
      evidence_packs: [EP-005]
      layer: 1  # O5-Q1, O5-Q4; O5-Q5 is Layer 3 human
      composite_note: Partial contribution only. O5-Q5 requires human judgment at Gate 3.
    non_owned_objects:
      - INTENDED_PURPOSE (primary: AG-001)
      - CLAIM (primary: AG-003)
      - EVIDENCE_BLOCK (primary: AG-004)
      - EQUIVALENCE_UNIT (primary: AG-005)
      - RISK_BENEFIT (FIX_01: composite, no machine owner — NOT owned by AG-006)
      - PMCF_HANDOFF (primary: AG-007)
    cannot_decide:
      - O5-Q2 residual risk acceptability → Gate 3 (Layer 3, contributes data but cannot adjudicate)
      - O5-Q5 CER/RMF alignment → Gate 3 (Layer 3, contributes data but cannot adjudicate)
      - RISK_BENEFIT final decision → Gate 3 Human Clinical Adjudication ONLY
      - Any PMCF_HANDOFF questions (primary: AG-007)
      - Overall PASS/FAIL verdict
    evidence_packs_consumed:
      - EP-005  # RMF, CER Sections 5/8/9, PMCF_Plan, Cross-Reference Inventory
    output_artifacts:
      - cross_doc_consistency_report.json
      - risk_benefit_contribution_report.json  # O5-Q1/Q4/Q5 partial
    allowed_stages:
      - stage_2_lane_2d
      - stage_6_rework
    fix_01_note: >
      FIX_01 correction applied: RISK_BENEFIT is NOT owned by AG-006.
      RISK_BENEFIT is a composite object requiring contributions from 5 agents.
      Human Clinical Adjudication (Gate 3) holds primary RISK_BENEFIT decision authority.
    can_set_final_disposition: false
    can_override_human_decision: false

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-007: PMCF Lifecycle Agent
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-007
    agent_name: PMCF Lifecycle Agent
    agent_key: cer_pmcf_lifecycle_agent
    description: PMCF_HANDOFF ownership, PMCF trigger identification, plan adequacy, milestone scheduling, alignment with CER conclusions
    scope: PMCF_HANDOFF primary ownership
    primary_object: PMCF_HANDOFF
    owned_questions:
      - O6-Q1: Are PMCF triggers explicitly identified?                   [Layer 1]
      - O6-Q2: Does PMCF_Plan cover all identified triggers?           [Layer 1]
      - O6-Q3: Are PMCF activities scheduled with milestones?           [Layer 1]
      - O6-Q4: Has PMCF adequacy been assessed against current evidence? [Layer 2]
      - O6-Q5: Are PMCF commitments aligned with CER conclusions?       [Layer 1]
    supporting_objects: none
    non_owned_objects:
      - INTENDED_PURPOSE (primary: AG-001)
      - CLAIM (primary: AG-003)
      - EVIDENCE_BLOCK (primary: AG-004)
      - EQUIVALENCE_UNIT (primary: AG-005)
      - RISK_BENEFIT (composite — no machine owner)
      - CROSS_DOC_LINK (primary: AG-006)
    cannot_decide:
      - O6-Q4 PMCF adequacy assessment → Gate 2 (can assess but not auto-adjudicate)
      - RISK_BENEFIT final decision → Gate 3 Human Clinical Adjudication ONLY
      - Any CROSS_DOC_LINK questions (primary: AG-006)
      - Overall PASS/FAIL verdict
    evidence_packs_consumed:
      - EP-005  # RMF, CER Sections 5/8/9, PMCF_Plan
    output_artifacts:
      - pmcf_need_statement.json
      - pmcf_adequacy_assessment.json
      - risk_benefit_contribution_report.json  # O5-Q3 partial
    allowed_stages:
      - stage_2_lane_2d
      - stage_6_rework
    human_gate_escalation:
      - O6-Q2 INADEQUATE → Gate 2
      - O6-Q4 NOT_ASSESSED → Gate 2
    risk_benefit_contribution:
      questions_answered: [O5-Q3]
      contribution_type: post_market_benefit_data
      evidence_packs: [EP-005]
      layer: 1
      composite_note: Partial contribution only. Not a terminal RISK_BENEFIT decision.
    can_set_final_disposition: false
    can_override_human_decision: false

  # ─────────────────────────────────────────────────────────────────────────────
  # AG-008: Review Package Agent (Aggregator, not primary reviewer)
  # ─────────────────────────────────────────────────────────────────────────────
  - agent_id: AG-008
    agent_name: Review Package Agent
    agent_key: cer_review_package_agent
    description: Aggregator only — assembles object decisions and human gate decisions into review package. Does NOT own objects.
    scope: Conclusion assembly aggregation only
    primary_object: none  # Aggregator, not a primary reviewer
    non_owned_objects:
      - INTENDED_PURPOSE
      - CLAIM
      - EVIDENCE_BLOCK
      - EQUIVALENCE_UNIT
      - RISK_BENEFIT (composite — no machine owner)
      - PMCF_HANDOFF
      - CROSS_DOC_LINK
    cannot_decide:
      - Any primary object decisions (aggregation only)
      - RISK_BENEFIT final decision → Gate 3 Human Clinical Adjudication ONLY
      - Overall PASS/FAIL verdict (human records)
    output_artifacts:
      - review_package.json
      - review_package.md
      - decision_ledger_entry.json
    allowed_stages:
      - stage_5_conclusion
      - stage_6_rework
    can_set_final_disposition: false
    can_override_human_decision: false

# ─────────────────────────────────────────────────────────────────────────────
# Human Roles (defined for gate authority clarity)
# ─────────────────────────────────────────────────────────────────────────────
human_roles:

  - role_id: human_protocol_owner
    name: Protocol Owner
    gates:
      - gate_0
    responsibilities:
      - Freeze project protocol
      - Confirm review scope
      - Approve input contract
      - Resolve INTENDED_PURPOSE MISMATCH
    allowed_decisions:
      - CONFIRM: Proceed with current INTENDED_PURPOSE
      - REVISE: Request IP revision before proceeding
      - ESCALATE: Flag for additional review

  - role_id: human_route_adjudicator
    name: Route Adjudicator
    gates:
      - gate_1
    responsibilities:
      - Confirm route selection (Literature/Equivalence/Mixed)
      - Approve special procedure flags
      - Verify EQUIVALENCE_UNIT access (O4-Q5 Layer 2)
      - Adjudicate clinical equivalence (O4-Q4 Layer 3)
    allowed_decisions:
      - APPROVE_EQUIVALENCE_ROUTE
      - REJECT_EQUIVALENCE_ROUTE
      - REQUIRE_LITERATURE_ROUTE
      - CONDITIONAL_EQUIVALENCE

  - role_id: human_clinical_adjudicator
    name: Clinical Adjudicator
    gates:
      - gate_2
    responsibilities:
      - Review CLAIM sufficiency (O2-Q2)
      - Adjudicate SOTA/equivalence novelty (O2-Q4 Layer 3)
      - Review EVIDENCE_BLOCK quality (O3-Q2)
      - Review PMCF plan adequacy (O6-Q2, O6-Q4)
      - Make final RISK_BENEFIT judgment (O5-Q2, O5-Q5 Layer 3) — Gate 3 ONLY
    risk_benefit_constraint: >
      RISK_BENEFIT final judgment (BRR_ACCEPTABLE/UNACCEPTABLE/MISALIGNED)
      belongs to Human Clinical Adjudication ONLY.
      No machine agent may issue terminal RISK_BENEFIT decision.

  - role_id: human_closure_owner
    name: Closure Owner
    gates:
      - gate_3
    responsibilities:
      - Confirm closure completeness
      - Assign follow-up actions
      - Trigger backflow
    allowed_decisions:
      - CLOSE
      - FOLLOWUP_REQUIRED

# ─────────────────────────────────────────────────────────────────────────────
# RISK_BENEFIT Composite Ownership Declaration
# (Must be explicitly stated — this is the FIX_01 core correction)
# ─────────────────────────────────────────────────────────────────────────────
risk_benefit_declaration:
  composite_object: RISK_BENEFIT
  classification: composite_adjudication_owned
  primary_decision_owner: Human Clinical Adjudication (Gate 3)
  no_single_machine_owner: true
  contributing_agents:
    - agent: AG-003 (Claim Scope Agent)
      contribution: O5-Q3 benefit magnitude characterization
      layer: 1
    - agent: AG-004 (SOTA Evidence Agent)
      contribution: O5-Q3 clinical benefit support
      layer: 1
    - agent: AG-005 (Equivalence Agent)
      contribution: O5-Q3 equivalence-based benefit
      layer: 1
    - agent: AG-006 (Consistency Agent)
      contribution: O5-Q1 risk controls, O5-Q4 formal BR assessment, O5-Q5 CER/RMF alignment
      layer: 1  # O5-Q1, O5-Q4; O5-Q5 is Layer 3 human
    - agent: AG-007 (PMCF Lifecycle Agent)
      contribution: O5-Q3 post-market benefit data
      layer: 1
  layer_distribution:
    O5-Q1: Layer 1 (AG-006)
    O5-Q2: Layer 3 (HUMAN ONLY — residual risk acceptability)
    O5-Q3: Layer 1 (AG-003, AG-004, AG-005, AG-007 — distributed)
    O5-Q4: Layer 1 (AG-006)
    O5-Q5: Layer 3 (HUMAN ONLY — CER/RMF alignment)
  gate_routing:
    O5-Q2: GATE_3 (human only)
    O5-Q5: GATE_3 (human only)
  machine_terminal_decision_prohibited:
    - BRR_ACCEPTABLE
    - BRR_UNACCEPTABLE
    - BRR_MISALIGNED
  terminal_decision_owner: Human Clinical Adjudication ONLY
  fix_01_reference: CER_AGENT_SYSTEM_BLUEPRINT_FIX_NOTE.md Section 1

# ─────────────────────────────────────────────────────────────────────────────
# Anti-Pattern Enforcement
# ─────────────────────────────────────────────────────────────────────────────
forbidden_patterns:
  - pattern: Omniscient Reviewer Agent
    description: Single agent that reviews everything (all 7 objects)
    enforcement: Each agent has explicit scope; AG-008 aggregates only
  - pattern: Document-Section Agent
    description: Agent defined by "CER Section 5 Agent" or "RMF Agent"
    enforcement: Agents defined by Review Objects, not document sections
  - pattern: Machine Final Adjudication
    description: Agent issuing terminal decision on Layer 3 objects
    enforcement: RISK_BENEFIT terminal decision is human-only
  - pattern: RISK_BENEFIT Single-Owner Machine Agent
    description: Assigning RISK_BENEFIT primary ownership to a single machine agent
    enforcement: RISK_BENEFIT is composite; 5 agents contribute; human adjudicates
  - pattern: Consistency Agent Owns RISK_BENEFIT
    description: Original error — Consistency Agent assigned RISK_BENEFIT ownership
    enforcement: FIX_01 applied; AG-006 owns CROSS_DOC_LINK only; RISK_BENEFIT is composite
  - pattern: RISK_BENEFIT to Gate 2
    description: Routing RISK_BENEFIT to Gate 2 (S09)
    enforcement: RISK_BENEFIT routes S10 → S11 (Gate 3) ONLY
