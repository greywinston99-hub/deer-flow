# ═══════════════════════════════════════════════════════════════════════════
# DEPRECATED — BIGDP2026.6 Phase 6
# This workflow is deprecated. Use cer_review_v1.yaml for production.
# Kept for reference only. Do NOT use for new CER Review runs.
# ═══════════════════════════════════════════════════════════════════════════
workflow_name: cer_review_v0
workflow_version: "0.1"
workflow_status: deprecated
mode: single_project_serial_review
description: >
  CER Review Workflow v0 P0 skeleton for running one real CER project review.
  This workflow implements the five-dimension CER review plus high-frequency
  problem scanning and cross-document consistency checking.

scope:
  project_scope: single_project
  institution_scope: single_body
  primary_review_object: CER
  cross_validation_inputs:
    - CER
    - CEP
    - IFU
    - RMF_RMR
    - PMCF_Plan
    - Tech_Docs
    - Literature
    - PMS_PSUR
    - Equivalence
  final_decision_requires_human_gate: true

contracts:
  cer_project_profile_schema: schemas/cer_project_profile.schema.json
  cer_hf_check_schema: schemas/cer_hf_check.schema.json
  cer_five_dimension_schema: schemas/cer_five_dimension.schema.json
  cer_cross_doc_consistency_schema: schemas/cer_cross_doc_consistency.schema.json
  cer_human_review_queue_schema: schemas/cer_human_review_queue.schema.json
  cer_equivalence_assessment_schema: schemas/cer_equivalence_assessment.schema.json
  cer_literature_quality_schema: schemas/cer_literature_quality.schema.json
  cer_gate_closure_schema: schemas/cer_gate_closure.schema.json

runtime_defaults:
  artifact_root: /mnt/user-data/outputs/cer_review_v0/${run_id}/artifacts
  source_root: /mnt/user-data/uploads
  enforce_source_binding: true
  enforce_human_gate: true
  conclusion_without_source_ref: forbidden
  final_status_values:
    - pass
    - conditional_pass
    - rework_required

artifact_contract:
  run_manifest: ${artifact_root}/00_manifest/run_manifest.json
  input_inventory: ${artifact_root}/00_manifest/input_inventory.json
  missing_items_report: ${artifact_root}/00_manifest/missing_items_report.md
  cer_normalized: ${artifact_root}/01_parse/cer_normalized.json
  cross_doc_entities: ${artifact_root}/01_parse/cross_doc_entities.json
  term_map: ${artifact_root}/01_parse/term_map.json
  hf_check_report: ${artifact_root}/02_hf_check/hf_check_report.json
  equivalence_assessment: ${artifact_root}/02_hf_check/equivalence_assessment.json
  literature_quality: ${artifact_root}/02_hf_check/literature_quality.json
  five_dimension_review: ${artifact_root}/03_five_dimension/five_dimension_review.json
  cross_doc_consistency: ${artifact_root}/04_cross_doc_consistency/cross_doc_consistency.json
  human_review_queue: ${artifact_root}/05_human_boundary/human_review_queue.json
  human_gate_decision: ${artifact_root}/05_human_boundary/human_gate_decision.json
  review_package: ${artifact_root}/06_review_package/review_package.json
  review_package_md: ${artifact_root}/06_review_package/review_package.md
  gate_closure_report: ${artifact_root}/07_gate_closure/gate_closure_report.json
  next_action_packet: ${artifact_root}/07_gate_closure/next_action_packet.json

layering_rules:
  layer_1:
    label: rules_based_auto_checks
    allowed_nodes:
      - cer_intake_agent
      - cer_parse_normalize_agent
      - cer_hf_check_agent
  layer_2:
    label: semi_rule_based_with_human_recheck
    allowed_nodes:
      - cer_five_dimension_agent
      - cer_cross_doc_consistency_agent
  layer_3:
    label: human_judgment_required
    allowed_nodes:
      - cer_human_boundary_agent
      - cer_review_package_agent
      - cer_gate_closure_agent

tool_restrictions:
  default_policy:
    allow_read_only_inputs: true
    allow_write_artifacts_only_under: ${artifact_root}
    block_final_compliance_verdict_without_human_gate: true

on_fail:
  default_action: emit_failure_artifact_and_stop
  failure_artifact: ${artifact_root}/failure/failure_report.json
  preserve_partial_artifacts: true
  escalate_to_human_when:
    - source_binding_breaks
    - required_input_missing_for_core_review
    - schema_validation_fails_after_repair_attempt

ordered_steps:
  - step_id: cer_intake_agent
    prompt_contract: prompts/cer_intake_agent.md
    layer: layer_1
    outputs:
      - run_manifest
      - input_inventory
      - missing_items_report
    on_fail: stop_and_emit_failure_artifact
  - step_id: cer_parse_normalize_agent
    prompt_contract: prompts/cer_parse_normalize_agent.md
    layer: layer_1
    depends_on:
      - cer_intake_agent
    outputs:
      - cer_normalized
      - cross_doc_entities
      - term_map
    on_fail: stop_and_emit_failure_artifact
  - step_id: cer_hf_check_agent
    prompt_contract: prompts/cer_hf_check_agent.md
    layer: layer_1
    depends_on:
      - cer_parse_normalize_agent
    outputs:
      - hf_check_report
    on_fail: stop_and_emit_failure_artifact
  - step_id: cer_five_dimension_agent
    prompt_contract: prompts/cer_five_dimension_agent.md
    layer: layer_2
    depends_on:
      - cer_hf_check_agent
    outputs:
      - five_dimension_review
    on_fail: stop_and_emit_failure_artifact
  - step_id: cer_cross_doc_consistency_agent
    prompt_contract: prompts/cer_cross_doc_consistency_agent.md
    layer: layer_2
    depends_on:
      - cer_five_dimension_agent
    outputs:
      - cross_doc_consistency
    on_fail: stop_and_emit_failure_artifact
  - step_id: cer_human_boundary_agent
    prompt_contract: prompts/cer_human_boundary_agent.md
    layer: layer_3
    depends_on:
      - cer_cross_doc_consistency_agent
    outputs:
      - human_review_queue
    on_fail: stop_and_emit_failure_artifact
  - step_id: cer_review_package_agent
    prompt_contract: prompts/cer_review_package_agent.md
    layer: layer_3
    depends_on:
      - cer_human_boundary_agent
    outputs:
      - review_package
      - review_package_md
    on_fail: stop_and_emit_failure_artifact
  - step_id: cer_gate_closure_agent
    prompt_contract: prompts/cer_gate_closure_agent.md
    layer: layer_3
    depends_on:
      - cer_review_package_agent
    outputs:
      - gate_closure_report
      - next_action_packet
    on_fail: stop_and_emit_failure_artifact

human_gate:
  required: true
  gate_after_step: cer_human_boundary_agent
  allowed_decisions:
    - pass
    - conditional_pass
    - rework_required
  gate_record_artifact: ${artifact_root}/05_human_boundary/human_gate_decision.json
  decision_rules:
    pass:
      meaning: Human reviewer accepts the CER review package with no blocking remediation.
    conditional_pass:
      meaning: Human reviewer accepts with tracked conditions, CAPA, or evidence supplementation.
    rework_required:
      meaning: Human reviewer rejects closure and requires document or assessment rework before rerun.

notes:
  - This is a DeerFlow-compatible CER review workflow skeleton.
  - HF scan, five-dimension review, and cross-doc consistency are the core pillars.
  - Layer 3 items (clinical equivalence, benefit-risk) are explicitly non-auto-decidable.
