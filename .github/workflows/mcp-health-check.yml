name: MCP Health Check

on:
  schedule:
    # Run daily at 06:00 UTC (14:00 CST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      server:
        description: 'Specific server to check (leave empty for all)'
        required: false
        default: ''

jobs:
  mcp-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run MCP health check
        id: health_check
        run: |
          cd backend
          pip install -e packages/harness 2>/dev/null || true
          
          SERVER_ARG=""
          if [ -n "${{ github.event.inputs.server }}" ]; then
            SERVER_ARG="--server ${{ github.event.inputs.server }}"
          fi
          
          python scripts/mcp_health_check.py --json --verbose ${SERVER_ARG} > mcp_health_report.json
          echo "report=$(cat mcp_health_report.json)" >> $GITHUB_OUTPUT
        env:
          CER_AUTHORING_KIMI_CODE_ROOT: /tmp/mcp-servers
          CER_AUTHORING_MCP_TIMEOUT_SECONDS: 60
        continue-on-error: true

      - name: Comment health report on PR
        if: github.event_name == 'pull_request' && steps.health_check.outputs.report
        uses: actions/github-script@v7
        with:
          script: |
            const report = JSON.parse('${{ steps.health_check.outputs.report }}');
            const status = report.overall_healthy ? '✅ All Healthy' : '❌ Some Unhealthy';
            const details = report.details.map(d => 
              `- ${d.server}: ${d.healthy ? '✅' : '❌'} v${d.version || 'N/A'} (${d.ping_latency_ms}ms)${d.error ? ' — ' + d.error : ''}`
            ).join('\n');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## MCP Health Check ${status}\n\n${details}\n\n*Run at ${{ github.run_id }}*`
            });

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-health-report
          path: backend/mcp_health_report.json
          retention-days: 30

      - name: Fail if unhealthy
        if: steps.health_check.outputs.report
        run: |
          cd backend
          python -c "
import json, sys
report = json.load(open('mcp_health_report.json'))
if not report['overall_healthy']:
    print('MCP health check failed')
    sys.exit(1)
print('MCP health check passed')
"
